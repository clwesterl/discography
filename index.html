<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discography Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg-card: #1a1815;
    --bg-card-hover: #211f1a;
    --cream: #f0e6d3;
    --cream-muted: #b8a98e;
    --amber: #d4a04a;
    --amber-dim: #8a6a2f;
    --text: #e8dcc8;
    --text-secondary: #9a8e7a;
    --border: #2a2620;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 300;
    line-height: 1.65;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  header {
    padding: 5rem 0 3rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 3rem;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 120px;
    height: 3px;
    background: var(--amber);
  }

  .collection-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    line-height: 1.05;
    color: var(--cream);
    letter-spacing: -0.02em;
    margin-bottom: 0.75rem;
  }

  .collection-subtitle {
    font-size: 1.15rem;
    color: var(--cream-muted);
    max-width: 600px;
    line-height: 1.7;
    font-style: italic;
  }

  .stats {
    display: flex;
    gap: 2.5rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2rem;
    color: var(--amber);
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s ease;
  }

  .filter-btn:hover, .filter-btn.active {
    color: var(--cream);
    border-color: var(--amber);
    background: rgba(212, 160, 74, 0.08);
  }

  /* Artist grid */
  .artist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-bottom: 4rem;
  }

  .artist-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .artist-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--amber-dim);
    transform: translateY(-2px);
  }

  .artist-card-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--cream);
    line-height: 1.2;
  }

  .artist-card-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .artist-card-desc {
    font-size: 0.95rem;
    color: var(--cream-muted);
    line-height: 1.6;
  }

  .artist-card-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: auto;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    background: rgba(212, 160, 74, 0.08);
    color: var(--amber-dim);
    border: 1px solid rgba(212, 160, 74, 0.12);
  }

  .artist-card-albums {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 0 3rem;
    margin-top: 2rem;
  }

  footer p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    .artist-grid {
      grid-template-columns: 1fr;
    }
    .container {
      padding: 0 1.25rem;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1 class="collection-title">Discography</h1>
    <p class="collection-subtitle">A curated collection of artist discographies — album-by-album guides to the catalog.</p>
    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="artist-count">0</span>
        <span class="stat-label">Artists</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="collection-count">9,520</span>
        <span class="stat-label">Albums in Library</span>
      </div>
    </div>
  </header>
</div>

<main>
  <div class="container">
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" onclick="filterArtists('all')">All</button>
    </div>

    <div class="artist-grid" id="artist-grid">
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>A personal discography collection. Built with care.</p>
  </div>
</footer>

<script>
const artists = [
  {
    name: "John Coltrane",
    file: "coltrane-discography.html",
    years: "1926–1967",
    genre: "Jazz",
    tags: ["hard bop", "modal jazz", "free jazz", "avant-garde"],
    albums: "28 studio + 14 live albums",
    description: "Saxophonist and composer whose restless evolution — from hard bop through modal jazz to free improvisation — redefined the possibilities of the tenor and soprano saxophone."
  },
  {
    name: "Radiohead",
    file: "radiohead-discography.html",
    years: "1985–present",
    genre: "Rock",
    tags: ["art rock", "electronic", "alternative", "experimental"],
    albums: "9 studio + 2 live albums",
    description: "Oxford five-piece whose arc from guitar-band anthems through electronic reinvention made them one of the most critically acclaimed acts of their generation."
  }
];

// Build genre filter buttons
const genres = [...new Set(artists.map(a => a.genre))].sort();
const filterBar = document.getElementById('filter-bar');
genres.forEach(genre => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = genre;
  btn.onclick = () => filterArtists(genre);
  filterBar.appendChild(btn);
});

// Render artist cards
function renderArtists(filter) {
  const grid = document.getElementById('artist-grid');
  grid.innerHTML = '';

  const filtered = filter === 'all' ? artists : artists.filter(a => a.genre === filter);

  filtered.sort((a, b) => a.name.localeCompare(b.name));

  filtered.forEach(artist => {
    const card = document.createElement('a');
    card.href = artist.file;
    card.className = 'artist-card';
    card.setAttribute('data-genre', artist.genre);
    card.innerHTML = `
      <div class="artist-card-name">${artist.name}</div>
      <div class="artist-card-meta">${artist.years}</div>
      <div class="artist-card-desc">${artist.description}</div>
      <div class="artist-card-albums">${artist.albums}</div>
      <div class="artist-card-tags">
        ${artist.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('artist-count').textContent = filtered.length;
}

function filterArtists(genre) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderArtists(genre);
}

// Initial render
renderArtists('all');
</script>

</body>
</html>
