<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discography Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg-card: #1a1815;
    --bg-card-hover: #211f1a;
    --cream: #f0e6d3;
    --cream-muted: #b8a98e;
    --amber: #d4a04a;
    --amber-dim: #8a6a2f;
    --text: #e8dcc8;
    --text-secondary: #9a8e7a;
    --border: #2a2620;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 300;
    line-height: 1.65;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  header {
    padding: 5rem 0 3rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 3rem;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 120px;
    height: 3px;
    background: var(--amber);
  }

  .collection-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    line-height: 1.05;
    color: var(--cream);
    letter-spacing: -0.02em;
    margin-bottom: 0.75rem;
  }

  .collection-subtitle {
    font-size: 1.15rem;
    color: var(--cream-muted);
    max-width: 600px;
    line-height: 1.7;
    font-style: italic;
  }

  .stats {
    display: flex;
    gap: 2.5rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2rem;
    color: var(--amber);
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* Search bar */
  .search-bar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .search-input {
    flex: 1;
    max-width: 400px;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 1rem;
    font-weight: 300;
    padding: 0.6rem 1rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder {
    color: var(--text-secondary);
    font-style: italic;
  }

  .search-input:focus {
    border-color: var(--amber-dim);
  }

  .search-add-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    padding: 0.6rem 1rem;
    border: 1px solid var(--amber-dim);
    border-radius: var(--radius);
    background: rgba(212, 160, 74, 0.08);
    color: var(--amber);
    cursor: pointer;
    transition: all 0.25s ease;
    display: none;
    white-space: nowrap;
  }

  .search-add-btn:hover {
    background: rgba(212, 160, 74, 0.15);
    border-color: var(--amber);
  }

  /* Pending artist card */
  .artist-card.pending {
    border-style: dashed;
    border-color: var(--amber-dim);
    opacity: 0.7;
  }

  .artist-card.pending:hover {
    opacity: 0.9;
    border-color: var(--amber);
  }

  .pending-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.15rem 0.55rem;
    border-radius: 2px;
    background: rgba(212, 160, 74, 0.12);
    color: var(--amber-dim);
    border: 1px solid rgba(212, 160, 74, 0.15);
  }

  .pending-remove {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-secondary);
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: auto;
    align-self: flex-start;
  }

  .pending-remove:hover {
    border-color: #8a3a2f;
    color: #c45b28;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s ease;
  }

  .filter-btn:hover, .filter-btn.active {
    color: var(--cream);
    border-color: var(--amber);
    background: rgba(212, 160, 74, 0.08);
  }

  /* Artist grid */
  .artist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-bottom: 4rem;
  }

  .artist-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .artist-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--amber-dim);
    transform: translateY(-2px);
  }

  .artist-card-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--cream);
    line-height: 1.2;
  }

  .artist-card-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .artist-card-desc {
    font-size: 0.95rem;
    color: var(--cream-muted);
    line-height: 1.6;
  }

  .artist-card-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: auto;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    background: rgba(212, 160, 74, 0.08);
    color: var(--amber-dim);
    border: 1px solid rgba(212, 160, 74, 0.12);
  }

  .artist-card-albums {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
  }

  /* To Buy floating button */
  .to-buy-toggle {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 500;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    padding: 0.7rem 1.2rem;
    border: 1px solid var(--amber-dim);
    border-radius: var(--radius);
    background: var(--bg-card);
    color: var(--amber);
    cursor: pointer;
    transition: all 0.25s ease;
    display: none;
  }

  .to-buy-toggle:hover {
    background: var(--bg-card-hover);
    border-color: var(--amber);
  }

  .to-buy-toggle .count {
    display: inline-block;
    background: var(--amber);
    color: var(--bg);
    font-size: 0.65rem;
    font-weight: 700;
    min-width: 1.2rem;
    height: 1.2rem;
    line-height: 1.2rem;
    text-align: center;
    border-radius: 50%;
    margin-left: 0.5rem;
  }

  /* To Buy panel */
  .to-buy-panel {
    position: fixed;
    top: 0;
    right: -420px;
    width: 400px;
    max-width: 90vw;
    height: 100vh;
    z-index: 600;
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    padding: 2rem 1.5rem;
    overflow-y: auto;
    transition: right 0.3s ease;
  }

  .to-buy-panel.open {
    right: 0;
  }

  .to-buy-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .to-buy-panel-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--cream);
  }

  .to-buy-close {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 0.25rem;
  }

  .to-buy-close:hover { color: var(--cream); }

  .to-buy-artist-group {
    margin-bottom: 1.5rem;
  }

  .to-buy-artist-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  .to-buy-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(42, 38, 32, 0.5);
  }

  .to-buy-item-info {
    flex: 1;
  }

  .to-buy-item-title {
    font-family: 'Source Serif 4', serif;
    font-size: 0.9rem;
    color: var(--text);
  }

  .to-buy-item-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
  }

  .to-buy-remove {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-secondary);
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    margin-left: 0.75rem;
    transition: all 0.2s;
  }

  .to-buy-remove:hover {
    border-color: #8a3a2f;
    color: #c45b28;
  }

  .to-buy-empty {
    font-family: 'Source Serif 4', serif;
    font-size: 0.95rem;
    color: var(--text-secondary);
    font-style: italic;
    padding: 2rem 0;
  }

  .to-buy-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 550;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .to-buy-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 0 3rem;
    margin-top: 2rem;
  }

  footer p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    .artist-grid {
      grid-template-columns: 1fr;
    }
    .container {
      padding: 0 1.25rem;
    }
    .to-buy-panel {
      width: 100vw;
      max-width: 100vw;
      right: -100vw;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1 class="collection-title">Discography</h1>
    <p class="collection-subtitle">A curated collection of artist discographies — album-by-album guides to the catalog.</p>
    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="artist-count">0</span>
        <span class="stat-label">Artists</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="collection-count">9,520</span>
        <span class="stat-label">Albums in Library</span>
      </div>
    </div>
  </header>
</div>

<main>
  <div class="container">
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Search or add an artist..." autocomplete="off">
      <button class="search-add-btn" id="search-add-btn">+ Add tile</button>
    </div>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" onclick="filterArtists('all')">All</button>
    </div>

    <div class="artist-grid" id="artist-grid">
    </div>
  </div>
</main>

<!-- To Buy panel -->
<button class="to-buy-toggle" id="to-buy-toggle" onclick="toggleToBuyPanel()">
  To Buy <span class="count" id="to-buy-count">0</span>
</button>
<div class="to-buy-overlay" id="to-buy-overlay" onclick="toggleToBuyPanel()"></div>
<div class="to-buy-panel" id="to-buy-panel">
  <div class="to-buy-panel-header">
    <div class="to-buy-panel-title">To Buy</div>
    <button class="to-buy-close" onclick="toggleToBuyPanel()">&times;</button>
  </div>
  <div id="to-buy-list"></div>
</div>

<footer>
  <div class="container">
    <p>A personal discography collection. Built with care.</p>
  </div>
</footer>

<script>
let artists = [];
let currentFilter = 'all';
let searchQuery = '';
const PENDING_KEY = 'discography-pending';

function getPending() {
  try { return JSON.parse(localStorage.getItem(PENDING_KEY)) || []; }
  catch { return []; }
}

function savePending(list) {
  localStorage.setItem(PENDING_KEY, JSON.stringify(list));
}

function addPending(name) {
  const list = getPending();
  if (!list.some(p => p.name.toLowerCase() === name.toLowerCase()) &&
      !artists.some(a => a.name.toLowerCase() === name.toLowerCase())) {
    list.push({ name: name, addedAt: new Date().toISOString() });
    savePending(list);
  }
  document.getElementById('search-input').value = '';
  searchQuery = '';
  renderAll();
}

function removePending(name) {
  const list = getPending().filter(p => p.name !== name);
  savePending(list);
  renderAll();
}

async function init() {
  try {
    const resp = await fetch('artists.json');
    artists = await resp.json();
  } catch {
    artists = [];
  }

  // Build genre filter buttons
  const genres = [...new Set(artists.map(a => a.genre))].sort();
  const filterBar = document.getElementById('filter-bar');
  genres.forEach(genre => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = genre;
    btn.onclick = (e) => filterArtists(genre, e);
    filterBar.appendChild(btn);
  });

  // Search input
  const searchInput = document.getElementById('search-input');
  const addBtn = document.getElementById('search-add-btn');

  searchInput.addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    const hasMatch = artists.some(a => a.name.toLowerCase().includes(searchQuery)) ||
                     getPending().some(p => p.name.toLowerCase().includes(searchQuery));
    const alreadyExists = artists.some(a => a.name.toLowerCase() === searchQuery) ||
                          getPending().some(p => p.name.toLowerCase() === searchQuery);

    if (searchQuery.length > 1 && !alreadyExists && !hasMatch) {
      addBtn.style.display = 'block';
      addBtn.textContent = '+ Add ' + this.value.trim();
    } else {
      addBtn.style.display = 'none';
    }
    renderAll();
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && addBtn.style.display === 'block') {
      addPending(this.value.trim());
    }
  });

  addBtn.addEventListener('click', function() {
    const name = searchInput.value.trim();
    if (name) addPending(name);
  });

  renderAll();
}

function renderAll() {
  const grid = document.getElementById('artist-grid');
  grid.innerHTML = '';

  // Combine real artists + pending
  let filtered = currentFilter === 'all' ? [...artists] : artists.filter(a => a.genre === currentFilter);

  // Apply search filter
  if (searchQuery) {
    filtered = filtered.filter(a => a.name.toLowerCase().includes(searchQuery));
  }

  filtered.sort((a, b) => a.name.localeCompare(b.name));

  // Render real artist cards
  filtered.forEach(artist => {
    const card = document.createElement('a');
    card.href = artist.file;
    card.className = 'artist-card';
    card.setAttribute('data-genre', artist.genre);
    card.innerHTML = `
      <div class="artist-card-name">${artist.name}</div>
      <div class="artist-card-meta">${artist.years}</div>
      <div class="artist-card-desc">${artist.description}</div>
      <div class="artist-card-albums">${artist.albums}</div>
      <div class="artist-card-tags">
        ${artist.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  // Render pending tiles
  let pending = getPending();
  if (searchQuery) {
    pending = pending.filter(p => p.name.toLowerCase().includes(searchQuery));
  }
  if (currentFilter !== 'all') {
    pending = []; // don't show pending in genre filters since they have no genre
  }

  pending.sort((a, b) => a.name.localeCompare(b.name));

  pending.forEach(p => {
    const card = document.createElement('div');
    card.className = 'artist-card pending';
    const esc = p.name.replace(/'/g, "\\'");
    card.innerHTML = `
      <div class="artist-card-name">${p.name}</div>
      <div class="artist-card-meta"><span class="pending-badge">Pending</span></div>
      <div class="artist-card-desc">Discography not yet generated. Ask Claude Code to build this page.</div>
      <button class="pending-remove" onclick="event.stopPropagation(); removePending('${esc}')">remove</button>
    `;
    grid.appendChild(card);
  });

  document.getElementById('artist-count').textContent = filtered.length + pending.length;
}

function filterArtists(genre, e) {
  currentFilter = genre;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (e) e.target.classList.add('active');
  renderAll();
}

init();

// ─── TO BUY LIST ───
const TO_BUY_KEY = 'discography-to-buy';

function getToBuyList() {
  try { return JSON.parse(localStorage.getItem(TO_BUY_KEY)) || []; }
  catch { return []; }
}

function saveToBuyList(list) {
  localStorage.setItem(TO_BUY_KEY, JSON.stringify(list));
  updateToBuyUI();
}

function removeFromToBuy(artist, album) {
  const list = getToBuyList().filter(
    item => !(item.artist === artist && item.album === album)
  );
  saveToBuyList(list);
}

function toggleToBuyPanel() {
  document.getElementById('to-buy-panel').classList.toggle('open');
  document.getElementById('to-buy-overlay').classList.toggle('open');
}

function updateToBuyUI() {
  const list = getToBuyList();
  const toggle = document.getElementById('to-buy-toggle');
  const countEl = document.getElementById('to-buy-count');
  const listEl = document.getElementById('to-buy-list');

  // Show/hide floating button
  toggle.style.display = list.length > 0 ? 'block' : 'none';
  countEl.textContent = list.length;

  // Group by artist
  const grouped = {};
  list.forEach(item => {
    if (!grouped[item.artist]) grouped[item.artist] = [];
    grouped[item.artist].push(item);
  });

  if (list.length === 0) {
    listEl.innerHTML = '<p class="to-buy-empty">No albums on your list yet. Browse an artist\'s discography and check "Want" on albums you\'d like to buy.</p>';
    return;
  }

  let html = '';
  Object.keys(grouped).sort().forEach(artist => {
    const albums = grouped[artist].sort((a, b) => (a.year || 0) - (b.year || 0));
    html += `<div class="to-buy-artist-group">
      <div class="to-buy-artist-name">${artist}</div>`;
    albums.forEach(item => {
      const meta = [item.year, item.label].filter(Boolean).join(' · ');
      html += `<div class="to-buy-item">
        <div class="to-buy-item-info">
          <div class="to-buy-item-title">${item.album}</div>
          ${meta ? `<div class="to-buy-item-meta">${meta}</div>` : ''}
        </div>
        <button class="to-buy-remove" onclick="removeFromToBuy('${item.artist.replace(/'/g, "\\'")}', '${item.album.replace(/'/g, "\\'")}')">remove</button>
      </div>`;
    });
    html += '</div>';
  });
  listEl.innerHTML = html;
}

// Init
updateToBuyUI();
</script>

</body>
</html>
